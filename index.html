<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gold OI Dashboard · GC</title>
<meta name="description" content="Gold (GC) Open Interest & Intraday Volume walls with standard-deviation zones + TradingView chart.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23c9920a'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header>
    <div class="hdr-left">
      <div class="hdr-eyebrow">GOLD · COMEX GC FUTURES</div>
      <h1 class="hdr-title">OI &amp; Volume Walls</h1>
      <div class="hdr-sub" id="contract-line">—</div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="btn-theme" title="สลับธีม สว่าง/มืด">◑</button>
      <button class="icon-btn" id="btn-refresh" title="รีเฟรชข้อมูล">↻</button>
      <label class="auto-toggle" title="รีเฟรชอัตโนมัติทุก 1 นาที">
        <input type="checkbox" id="chk-auto"> auto
      </label>
    </div>
  </header>

  <div class="status-line"><span class="pulse" id="pulse"></span><span id="status">กำลังโหลด…</span></div>

  <!-- ── AI PLAN (from The Invisible Money method, 13:00 & 19:00) ── -->
  <section class="plan-card" id="plan"><!-- filled by app.js --></section>

  <!-- ── SUMMARY CARDS ── -->
  <section class="summary" id="summary"><!-- filled by app.js --></section>

  <!-- ── SD GAUGE ── -->
  <section class="gauge-card" id="gauge"><!-- filled by app.js --></section>

  <!-- ── VIEW TOGGLE ── -->
  <div class="toolbar">
    <div class="seg" role="tablist">
      <button class="seg-btn active" id="seg-oi" role="tab">OI</button>
      <button class="seg-btn" id="seg-intraday" role="tab">Intraday</button>
      <button class="seg-btn" id="seg-both" role="tab">Both</button>
    </div>
    <div class="legend">
      <span class="lg lg-call">■ Call</span>
      <span class="lg lg-put">■ Put</span>
    </div>
  </div>

  <!-- ── BELL CURVE (compact distribution) ── -->
  <section class="bell-wrap">
    <div class="bell-srctime" id="data-time"><!-- source update time by app.js --></div>
    <div id="bell"><!-- svg by app.js --></div>
    <div class="bell-cross" id="bell-cross"></div>
    <div class="bell-tip" id="bell-tip"></div>
    <div class="bell-axis" id="bell-axis"></div>
    <div class="bell-cap" id="bell-cap"></div>
  </section>

  <!-- ── OI LADDER ── -->
  <section class="ladder-wrap">
    <div class="ladder-head">
      <span>Put</span><span>Strike</span><span>Call</span>
    </div>
    <div id="ladder" class="ladder"><!-- filled by app.js --></div>
    <div class="zone-key">
      <span class="zk zk-in">±1σ 68%</span>
      <span class="zk zk-1">±2σ 95%</span>
      <span class="zk zk-2">±3σ 99.7%</span>
    </div>
  </section>

  <!-- ── TRADINGVIEW CHART ── -->
  <section class="chart-wrap">
    <div class="section-title">กราฟ TradingView · วางแผนรายวัน</div>
    <div class="tv-frame">
      <div class="tradingview-widget-container" id="tv">
        <div class="tradingview-widget-container__widget"></div>
      </div>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <span>ข้อมูล OI/Volume: <a href="https://github.com/pageth/Vol2VolData" target="_blank" rel="noopener">pageth/Vol2VolData</a></span>
    <span id="data-stamp"></span>
  </footer>

</div>

<script src="js/data.js?v=2"></script>
<script src="js/app.js?v=5"></script>
</body>
</html>
