name: Daily Gold Plan

# Generates plan.json in the cloud (no PC needed) at 13:00 & 19:00 Thailand time,
# Mon–Fri. GitHub cron runs in UTC; ICT = UTC+7 (Thailand has no DST).
on:
  schedule:
    # minutes shifted off :00 (GitHub queues are busiest at the top of the hour).
    # Cloud is the BACKUP (fires ~8 min after the local PC task's exact slot).
    - cron: "8 6 * * 1-5"    # 06:08 UTC = 13:08 ICT
    - cron: "8 12 * * 1-5"   # 12:08 UTC = 19:08 ICT
    - cron: "38 14 * * 1-5"  # 14:38 UTC = 21:38 ICT
  workflow_dispatch: {}       # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write             # let the job commit plan.json back to the repo

concurrency:
  group: daily-plan           # never run two at once
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install chart dependency
        run: pip install --quiet matplotlib

      - name: Generate plan.json
        run: python generate_plan.py --no-push --if-stale
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plan.json data
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Auto plan (cloud) $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
