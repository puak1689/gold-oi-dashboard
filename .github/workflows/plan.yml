name: Daily Gold Plan

# Generates plan.json in the cloud (no PC needed) at 13:00 & 19:00 Thailand time,
# Mon–Fri. GitHub cron runs in UTC; ICT = UTC+7 (Thailand has no DST).
on:
  schedule:
    - cron: "0 6 * * 1-5"    # 06:00 UTC = 13:00 ICT
    - cron: "0 12 * * 1-5"   # 12:00 UTC = 19:00 ICT
  workflow_dispatch: {}       # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write             # let the job commit plan.json back to the repo

concurrency:
  group: daily-plan           # never run two at once
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate plan.json
        run: python generate_plan.py --no-push

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plan.json
          if git diff --cached --quiet; then
            echo "plan.json unchanged — nothing to commit"
          else
            git commit -m "Auto plan (cloud) $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
